[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "kenya-house-listings-api"

[services.variables]
FLASK_ENV = "production"
PYTHON_VERSION = "3.9"
PORT = "5000"

[services.ports]
port = 5000

[env]
FLASK_ENV = "production"
PYTHON_VERSION = "3.9"
